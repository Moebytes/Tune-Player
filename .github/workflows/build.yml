name: Build App

on:
  push:
    branches:
      - main 
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: Tune-Player
  ARTIFACT_PREFIX: tune-player

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build on ${{matrix.os}}
    runs-on: ${{matrix.runner}}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            runner: macos-latest
            platform: darwin
          - os: windows-latest
            runner: windows-latest
            platform: win32
          - os: ubuntu-latest
            runner: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: macOS code signing
        if: runner.os == 'macOS'
        run: |
          echo "${{secrets.MAS_PROVISIONING_PROFILE}}" | base64 --decode > assets/mas/MacAppStore.provisionprofile

          echo "${{secrets.CSC_KEY}}" | base64 --decode > ~/certs.p12

          security create-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p actions build.keychain
          security default-keychain -s build.keychain

          security import ~/certs.p12 \
            -k build.keychain -f pkcs12 \
            -P "${{secrets.CSC_KEY_PASSWORD}}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k actions build.keychain

          security list-keychains -d user -s build.keychain login.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Replace spaces
        shell: bash
        run: |
          cd build
          for f in *; do
            nf=$(echo "$f" | tr ' ' '-')
            if [ "$f" != "$nf" ]; then
              mv "$f" "$nf"
            fi
          done

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_PREFIX}}-mac
          path: |
            build/mas-arm64/${{env.APP_NAME}}-*.pkg
            build/${{env.APP_NAME}}-*.dmg

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_PREFIX}}-win
          path: |
            build/${{env.APP_NAME}}-*.appx
            build/${{env.APP_NAME}}-*.exe

      - name: Upload Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.ARTIFACT_PREFIX}}-linux
          path: |
            build/${{env.APP_NAME}}-*.AppImage